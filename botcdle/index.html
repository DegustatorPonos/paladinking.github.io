<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.dropbtn {
  background-color: #04AA6D;
  color: white;
  padding: 16px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

.dropbtn:hover, .dropbtn:focus {
  background-color: #3e8e41;
}

#myInput {
  box-sizing: border-box;
  background-image: url('searchicon.png');
  background-position: 14px 12px;
  background-repeat: no-repeat;
  font-size: 16px;
  padding: 14px 20px 12px 45px;
  border: none;
  border-bottom: 1px solid black;
  width: 512px;
}

#myInput:focus {outline: 3px solid #ddd;}

#characterChoice {
    max-height: 400px;
    overflow-y: auto;
    overflow-x: hidden;
}

.dropdown-content {
  display: block;
  position: absolute;
  background-color: #f6f6f6;
  min-width: 200px;
  overflow: auto;
  border: 1px solid #ddd;
  z-index: 1;
}

.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
}

.choiceBtn {
    border-bottom: 1px solid;
    display: flex;
    cursor: pointer;
}

#guesses th {
    border: 1px solid black;
    width: 166px;
    height: 80px;
}

#guesses td {
    border: 1px solid black;
    width: 166px;
    height: 80px;
    text-align: center;
    line-height: 1.6;
    color: white;
}

.icon {
    background-color: gray;
}

.correct {
    background-color: green;
}

.partCorrect {
    background-color: #8B8000;
}

.incorrect {
    background-color: darkred;
}

#characterChoice :hover {background-color: #ddd;}
.searchTarget {background-color: #ddd;}
.focus {background-color: #ddd;}

</style>
</head>
<body style="background-color:white;">


<div id="guesses">
    <table>
        <thead>
            <tr>
                <th scope="col">Guess</th>
                <th scope="col">Character type</th>
                <th scope="col">Script</th>
                <th scope="col">First night wakeup</th>
                <th scope="col">Other nights wakeup</th>
                <th scope="col">Ability Type</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>
</div>

<div id="dropdown">
  <div id="characterChoice" class="dropdown-content">
    <input type="text" placeholder="Guess.." id="myInput">
  </div>
</div>


<script src="script.js" type="module"></script>

</body>
</html>
